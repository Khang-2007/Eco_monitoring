<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMonitor Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1559592413-7cec430aa669?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .glass-card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #007bff; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <h2 class="text-white mb-4"><i class="fas fa-leaf"></i> EcoMonitor Dashboard</h2>

    <div class="row">
        <div class="col-lg-4">
            <div class="glass-card text-center">
                <h5>Chất lượng Không khí (AQI)</h5>
                <div class="stat-value" id="aqi-val">--</div>
                <p class="text-muted" id="city-val">Đang tải dữ liệu...</p>
                <div class="d-flex justify-content-around mt-3">
                    <div><i class="fas fa-temperature-high text-danger"></i> <span id="temp-val">--</span>°C</div>
                    <div><i class="fas fa-tint text-info"></i> <span id="hum-val">--</span>%</div>
                </div>
            </div>

            <div class="glass-card text-center">
                <h5><i class="fas fa-camera text-primary"></i> Đánh giá Nước (AI)</h5>
                <input type="file" id="waterImage" accept="image/*" capture="environment" class="form-control mb-3 mt-3">
                <button onclick="analyzeWater()" class="btn btn-primary w-100" id="analyzeBtn">Phân tích ngay</button>
                <div id="waterResult" class="mt-3 text-start" style="display:none;">
                    <hr>
                    <p><strong>Kết quả:</strong> <span id="w-status"></span></p>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card">
                <h5>Biểu đồ AQI 7 ngày qua (Mô phỏng)</h5>
                <canvas id="aqiChart" height="100"></canvas> 
            </div>
            
            <div class="glass-card">
                <h5>Gợi ý hành động hôm nay</h5>
                <ul class="list-group list-group-flush" id="action-tips">
                    <li class="list-group-item bg-transparent">Đang phân tích dữ liệu...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. LẤY DỮ LIỆU THỜI TIẾT TỪ BACKEND
    async function fetchEnvironment() {
        try {
            const res = await fetch('/api/environment');
            const result = await res.json();
            if (result.status === 'success') {
                const data = result.data;
                document.getElementById('aqi-val').innerText = data.aqi;
                document.getElementById('city-val').innerText = data.city;
                document.getElementById('temp-val').innerText = data.temp;
                document.getElementById('hum-val').innerText = data.humidity;
                
                // Cập nhật gợi ý dựa trên AQI
                const tipsList = document.getElementById('action-tips');
                if(data.aqi < 50) {
                    tipsList.innerHTML = `<li class="list-group-item bg-transparent text-success"><i class="fas fa-check-circle"></i> Không khí tuyệt vời! Rất thích hợp để chạy bộ ngoài biển.</li>`;
                } else {
                    tipsList.innerHTML = `<li class="list-group-item bg-transparent text-warning"><i class="fas fa-exclamation-triangle"></i> Cảnh báo: Chất lượng không khí không tốt. Hạn chế hoạt động mạnh ngoài trời.</li>`;
                }
            }
        } catch (e) { console.log("Lỗi tải dữ liệu", e); }
    }

    // 3. TÍNH NĂNG CAMERA
    async function analyzeWater() {
        const fileInput = document.getElementById('waterImage');
        if (fileInput.files.length === 0) return alert("Vui lòng chọn ảnh!");
        
        document.getElementById('analyzeBtn').innerText = "Đang xử lý...";
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        const res = await fetch('/api/analyze_water', { method: 'POST', body: formData });
        const data = await res.json();
        
        if(data.status === 'success') {
            document.getElementById('w-status').innerText = data.data.quality;
            document.getElementById('waterResult').style.display = 'block';
        }
        document.getElementById('analyzeBtn').innerText = "Phân tích ngay";
    }

    // Chạy các hàm khi web vừa load xong
    window.onload = () => {
        fetchEnvironment();
        drawChart();
    }
</script>
</body>
</html>
